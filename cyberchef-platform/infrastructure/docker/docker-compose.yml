version: '3.8'
services:
  auth-service:
    build: ../services/auth-service
    ports:
      - "5000:5000"
    env_file:
      - ../services/auth-service/.env
  recipe-service:
    build: ../services/recipe-service
    ports:
      - "5001:5001"
    env_file:
      - ../services/recipe-service/.env
  ai-service:
    build: ../services/ai-service
    ports:
      - "5002:5002"
    env_file:
      - ../services/ai-service/.env
  feed-service:
    build: ../services/feed-service
    ports:
      - "5003:5003"
    env_file:
      - ../services/feed-service/.env
  billing-service:
    build: ../services/billing-service
    ports:
      - "5004:5004"
    env_file:
      - ../services/billing-service/.env
  analytics-service:
    build: ../services/analytics-service
    ports:
      - "5005:5005"
    env_file:
      - ../services/analytics-service/.env
  admin-service:
    build: ../services/admin-service
    ports:
      - "5006:5006"
    env_file:
      - ../services/admin-service/.env
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
volumes:
  mongo-data:
