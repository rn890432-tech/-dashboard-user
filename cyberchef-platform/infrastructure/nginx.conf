user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

http {
  resolver 127.0.0.11 ipv6=off valid=10s;
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
  access_log  /var/log/nginx/access.log  main;
  sendfile        on;
  keepalive_timeout  65;

  server {
    listen 80;
    server_name _;

    set $web_upstream web:80;
    set $api_upstream api:4000;
    set $auth_upstream auth:4001;
    set $ai_upstream ai:4002;
    set $video_upstream video:4003;
    set $grocery_upstream grocery:5007;
    set $marketplace_upstream marketplace:5011;

    location / {
      proxy_pass http://$web_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
      proxy_pass http://$api_upstream/;
    }
    location /auth/ {
      proxy_pass http://$auth_upstream/;
    }
    location /ai/ {
      proxy_pass http://$ai_upstream/;
    }
    location /video/ {
      proxy_pass http://$video_upstream/;
    }
    location /grocery/ {
      proxy_pass http://$grocery_upstream/;
    }
    location /marketplace/ {
      proxy_pass http://$marketplace_upstream/;
    }
  }
}
