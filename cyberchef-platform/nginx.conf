worker_processes 1;

events { worker_connections 1024; }

http {
  upstream auth_service { server auth-service:5000; }
  upstream recipe_service { server recipe-service:5001; }
  upstream ai_service { server ai-service:5002; }
  upstream feed_service { server feed-service:5003; }
  upstream billing_service { server billing-service:5004; }
  upstream analytics_service { server analytics-service:5005; }
  upstream video_service { server video-service:5006; }

  server {
    listen 80;
    server_name cyberchef.local;

    location /api/auth {
      proxy_pass http://auth_service;
    }
    location /api/recipes {
      proxy_pass http://recipe_service;
    }
    location /api/ai {
      proxy_pass http://ai_service;
    }
    location /api/feed {
      proxy_pass http://feed_service;
    }
    location /api/billing {
      proxy_pass http://billing_service;
    }
    location /api/analytics {
      proxy_pass http://analytics_service;
    }
    location /api/video {
      proxy_pass http://video_service;
    }
  }
}
