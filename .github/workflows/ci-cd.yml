name: CI/CD - Jest, Cypress, Deploy (Staging & Production)

on:
  push:
    branches:
      - main
      - staging
  pull_request:

jobs:
  # ─── Tests ───────────────────────────────────────────────────────────────────

  jest-tests:
    name: Jest Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Run Jest
        run: node ./node_modules/react-scripts/bin/react-scripts.js test --ci

  cypress-tests:
    name: Cypress Tests (${{ matrix.os }} / Node ${{ matrix.node }} / ${{ matrix.browser }})
    needs: jest-tests
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [16, 18, 20]
        browser: [chrome, firefox, edge]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            cypress-${{ runner.os }}-
      - run: npm install
      - uses: cypress-io/github-action@v6
        with:
          start: npm start
          wait-on: http://localhost:3000
          browser: ${{ matrix.browser }}
          record: true
          key: ${{ secrets.CYPRESS_RECORD_KEY }}
          parallel: true
      - name: Upload Cypress Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts-${{ matrix.os }}-node-${{ matrix.node }}-${{ matrix.browser }}
          path: |
            cypress/screenshots
            cypress/videos
            cypress/logs

  # ─── Deploy ──────────────────────────────────────────────────────────────────

  deploy-staging:
    name: Deploy Staging
    needs: [jest-tests, cypress-tests]
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Staging
        run: vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
      - name: Notify Slack - Staging Live
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set; skipping staging Slack notify."
            exit 0
          fi
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"🚀 Staging deployment complete. Branch: ${{ github.ref_name }} | Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
          "$SLACK_WEBHOOK_URL"

  deploy-production:
    name: Deploy Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    outputs:
      deploy_duration: ${{ steps.duration.outputs.deploy_duration }}
    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: start
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Deploy to Production
        id: deploy
        run: vercel --prod --token ${{ secrets.VERCEL_TOKEN }}

      - name: Record end time
        id: end
        run: echo "end=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Calculate duration
        id: duration
        run: |
          duration=$(( ${{ steps.end.outputs.end }} - ${{ steps.start.outputs.start }} ))
          echo "deploy_duration=${duration}" >> $GITHUB_OUTPUT

      - name: Send deploy duration to Datadog
        run: |
          curl -X POST "https://api.datadoghq.com/api/v1/series" \
          -H "Content-Type: application/json" \
          -H "DD-API-KEY: ${{ secrets.DD_API_KEY }}" \
          -d '{
            "series": [{
              "metric": "ci.deploy.duration",
              "points": [[ '"$(date +%s)"', ${{ steps.duration.outputs.deploy_duration }} ]],
              "tags": ["env:production","commit:${{ github.sha }}"]
            }]
          }'

      - name: Notify Slack - Production Live
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set; skipping production Slack notify."
            exit 0
          fi
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"✅ Production deployment complete! Duration: ${{ steps.duration.outputs.deploy_duration }}s"}' \
          "$SLACK_WEBHOOK_URL"

  # ─── Rolling Average ──────────────────────────────────────────────────────────

  rolling-average:
    name: Compute Rolling Deploy Average
    needs: deploy-production
    runs-on: ubuntu-latest
    outputs:
      rolling_avg: ${{ steps.avg.outputs.rolling_avg }}
    steps:
      - uses: actions/checkout@v4
      - name: Download deploy metrics
        uses: actions/download-artifact@v4
        with:
          name: deploy-metrics
        continue-on-error: true
      - name: Compute rolling average
        id: avg
        run: |
          if [ -f deploy-metrics.csv ]; then
            avg=$(tail -5 deploy-metrics.csv | awk -F',' '{sum+=$2; count++} END {if(count>0) printf "%.0f", sum/count; else print 0}')
          else
            avg=0
          fi
          echo "rolling_avg=$avg" >> $GITHUB_OUTPUT

  # ─── Threshold Alerts ────────────────────────────────────────────────────────

  check-thresholds:
    name: Check Deploy Thresholds
    needs: [deploy-production, rolling-average]
    runs-on: ubuntu-latest
    outputs:
      alert: ${{ steps.check.outputs.alert }}
      env: ${{ steps.check.outputs.env }}
    steps:
      - name: Check thresholds
        id: check
        run: |
          duration=${{ needs.deploy-production.outputs.deploy_duration }}
          avg=${{ needs.rolling-average.outputs.rolling_avg }}
          env="production"
          alert="false"
          if [ "$duration" -gt 120 ]; then alert="true"; fi
          if [ "$avg" -gt 90 ]; then alert="true"; fi
          echo "alert=$alert" >> $GITHUB_OUTPUT
          echo "env=$env" >> $GITHUB_OUTPUT

  notify-slow-slack:
    name: Notify Slack - Slow Deploy
    needs: check-thresholds
    if: needs.check-thresholds.outputs.alert == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set; skipping Slack notify."
            exit 0
          fi
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"⚠️ Slow deploy in ${{ needs.check-thresholds.outputs.env }}. Duration: ${{ needs.deploy-production.outputs.deploy_duration }}s"}' \
          "$SLACK_WEBHOOK_URL"

  notify-slow-teams:
    name: Notify Teams - Slow Deploy
    needs: check-thresholds
    if: needs.check-thresholds.outputs.alert == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Teams
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set; skipping Teams notify."
            exit 0
          fi
          curl -H 'Content-Type: application/json' \
          -d '{"@type":"MessageCard","@context":"http://schema.org/extensions","summary":"Slow Deploy","themeColor":"FFA500","title":"⚠️ Slow deploy in ${{ needs.check-thresholds.outputs.env }}","sections":[{"facts":[{"name":"Duration","value":"${{ needs.deploy-production.outputs.deploy_duration }}s"},{"name":"Rolling Avg","value":"${{ needs.rolling-average.outputs.rolling_avg }}s"}]}]}' \
          "$TEAMS_WEBHOOK_URL"

  notify-production-slack:
    name: Notify Slack - Production Done
    needs: [deploy-production, rolling-average]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set; skipping Slack notify."
            exit 0
          fi
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"🚀 Production deploy completed in ${{ needs.deploy-production.outputs.deploy_duration }}s (avg last 5: ${{ needs.rolling-average.outputs.rolling_avg }}s)"}' \
          "$SLACK_WEBHOOK_URL"

  notify-production-teams:
    name: Notify Teams - Production Done
    needs: [deploy-production, rolling-average]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Teams
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set; skipping Teams notify."
            exit 0
          fi
          curl -H 'Content-Type: application/json' \
          -d '{"@type":"MessageCard","@context":"http://schema.org/extensions","summary":"Production Deployment","themeColor":"00CC66","title":"🚀 Production deployment completed","sections":[{"facts":[{"name":"Duration","value":"${{ needs.deploy-production.outputs.deploy_duration }}s"},{"name":"Rolling Avg (last 5)","value":"${{ needs.rolling-average.outputs.rolling_avg }}s"}]}]}' \
          "$TEAMS_WEBHOOK_URL"

  # ─── Failure Reporting ───────────────────────────────────────────────────────

  failure-summary:
    name: Failure Summary
    if: failure()
    needs: [jest-tests, cypress-tests, deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    outputs:
      jobs_failed: ${{ steps.summary.outputs.jobs_failed }}
    steps:
      - name: Generate failure list
        id: summary
        run: |
          failed=""
          for job in jest-tests cypress-tests deploy-staging deploy-production; do
            echo "Checking $job..."
          done
          echo "jobs_failed=${failed}" >> $GITHUB_OUTPUT

  notify-failure-slack:
    name: Notify Slack - Failure
    needs: failure-summary
    if: always() && needs.failure-summary.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack of Failures
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set; skipping Slack failure notify."
            exit 0
          fi
          curl -X POST -H 'Content-type: application/json' \
          --data '{"text":"❌ Workflow failed! Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
          "$SLACK_WEBHOOK_URL"

  notify-failure-teams:
    name: Notify Teams - Failure
    needs: failure-summary
    if: always() && needs.failure-summary.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Teams of Failures
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set; skipping Teams failure notify."
            exit 0
          fi
          curl -H 'Content-Type: application/json' \
          -d '{"@type":"MessageCard","@context":"http://schema.org/extensions","summary":"Workflow Failures","themeColor":"FF0000","title":"❌ Workflow failed","sections":[{"facts":[{"name":"Run","value":"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}]}]}' \
          "$TEAMS_WEBHOOK_URL"
