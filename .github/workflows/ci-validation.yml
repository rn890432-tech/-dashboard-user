name: CI Validation

on:
  pull_request:
    paths:
      - '**/*.yml'
      - '**/*.yaml'

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install yamllint
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Run yamllint
        run: yamllint .

  act-simulation:
    runs-on: ubuntu-latest
    needs: yamllint
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install act
        run: |
          curl -s https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash

      - name: Simulate workflow with act
        run: |
          act pull_request --dryrun
