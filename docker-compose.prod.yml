services:
  web:
    build: ./cyberchef-platform
    image: cyberchef/web:prod
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - API_URL=http://api:4000
    depends_on:
      - api
      - auth
      - ai
      - video
      - grocery
      - marketplace
  api:
    build: ./cyberchef-platform/services/recipe-service
    image: cyberchef/api:prod
    environment:
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongo:27017/recipes
      - REDIS_URL=redis://redis:6379
      - S3_BUCKET=cyberchef-recipes
      - S3_ENDPOINT=http://minio:9000
      - JWT_SECRET=changeme
    depends_on:
      - mongo
      - redis
      - minio
  auth:
    build: ./cyberchef-platform/services/auth-service
    image: cyberchef/auth:prod
    environment:
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongo:27017/auth
      - JWT_SECRET=changeme
    depends_on:
      - mongo
  ai:
    build: ./cyberchef-platform/services/ai-service
    image: cyberchef/ai:prod
    environment:
      - NODE_ENV=production
      - API_KEY=changeme
  video:
    build: ./cyberchef-platform/services/video-service
    image: cyberchef/video:prod
    environment:
      - NODE_ENV=production
      - S3_BUCKET=cyberchef-videos
      - S3_ENDPOINT=http://minio:9000
    depends_on:
      - minio
  grocery:
    build: ./cyberchef-platform/services/grocery-service
    image: cyberchef/grocery:prod
    ports:
      - "4004:5007"
    environment:
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongo:27017/grocery
    depends_on:
      - mongo
  marketplace:
    build: ./cyberchef-platform/services/creator-marketplace-service
    image: cyberchef/marketplace:prod
    ports:
      - "4005:5011"
    environment:
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongo:27017/marketplace
    depends_on:
      - mongo
  mongo:
    image: mongo:6
    restart: always
    volumes:
      - mongo-data:/data/db
  redis:
    image: redis:7
    restart: always
    volumes:
      - redis-data:/data
  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=changeme
    ports:
      - "9000:9000"
    volumes:
      - minio-data:/data
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./cyberchef-platform/infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
      - auth
      - ai
      - video
      - grocery
      - marketplace
  monitoring:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./cyberchef-platform/infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - web
      - api
      - auth
      - ai
      - video
      - grocery
      - marketplace
  logging:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    depends_on:
      - monitoring
volumes:
  mongo-data:
  redis-data:
  minio-data:
